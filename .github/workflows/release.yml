name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Test, Build, Publish & Release
    runs-on: speedra-runners

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Linux binary
        run: bun build src/index.ts --compile --target=bun-linux-x64
          --outfile=speedra-linux-x64

      - name: Publish to npm (with provenance via OIDC)
        run: npm publish --provenance --access public

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          {
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "---"
            echo ""
            echo "## Installation"
            echo ""
            echo "**Via npm (requires Node.js ≥ 18):**"
            echo '```bash'
            echo "npm install -g speedra"
            echo "# or:"
            echo "npx speedra"
            echo '```'
            echo ""
            echo "**Standalone binary (Linux x64, no Node.js required):**"
            echo ""
            echo "Download \`speedra-linux-x64\` from the assets below."
            echo ""
            echo '```bash'
            echo "chmod +x speedra-linux-x64"
            echo "./speedra-linux-x64"
            echo '```'
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${GITHUB_REF_NAME}"
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: speedra-linux-x64
